<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    
    <!-- Vibrant cyan/blue primary gradient for the check -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Glowing accent effect -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base App Shape -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  
  <!-- Subtle inner border for premium feel -->
  <rect x="4" y="4" width="504" height="504" rx="112" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>

  <!-- Center Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <!-- Main Icon Group -->
  <g transform="translate(42, 42)" filter="url(#shadow)">
    <!-- Sleek Container Circle -->
    <circle cx="214" cy="214" r="130" fill="#1e293b" opacity="0.6" stroke="#334155" stroke-width="6"/>
    
    <!-- Dynamic Checkmark -->
    <path d="M 148 220 L 192 264 L 290 156" fill="none" stroke="url(#primary)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Small decorative accents -->
  <circle cx="400" cy="112" r="12" fill="#22d3ee" opacity="0.8"/>
  <circle cx="112" cy="400" r="8" fill="#0284c7" opacity="0.5"/>
</svg>
