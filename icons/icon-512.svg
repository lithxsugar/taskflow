<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <g transform="translate(122, 133)" filter="url(#shadow)">
    <!-- Back layer (Purple) -->
    <rect x="44" y="0" width="224" height="224" rx="42" fill="url(#secondary)" opacity="0.4"/>
    <!-- Front layer (Blue) -->
    <rect x="0" y="44" width="224" height="224" rx="42" fill="url(#primary)"/>
    
    <!-- Checklist symbol inside front layer -->
    <path d="M 64 154 L 96 186 L 160 106" fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Subtle decorative dot -->
  <circle cx="372" cy="128" r="12" fill="#38bdf8" opacity="0.6"/>
</svg>
