<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  
  <g transform="translate(46, 50)" filter="url(#shadow)">
    <!-- Back layer (Purple) -->
    <rect x="16" y="0" width="84" height="84" rx="16" fill="url(#secondary)" opacity="0.4"/>
    <!-- Front layer (Blue) -->
    <rect x="0" y="16" width="84" height="84" rx="16" fill="url(#primary)"/>
    
    <!-- Checklist symbol inside front layer -->
    <path d="M 24 58 L 36 70 L 60 40" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Subtle decorative dot -->
  <circle cx="140" cy="48" r="4" fill="#38bdf8" opacity="0.6"/>
</svg>
