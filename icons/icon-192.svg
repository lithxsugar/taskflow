<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Premium dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    
    <!-- Vibrant cyan/blue primary gradient for the check -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Glowing accent effect -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base App Shape -->
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  
  <!-- Subtle inner border for premium feel -->
  <rect x="2" y="2" width="188" height="188" rx="42" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Center Glow -->
  <circle cx="96" cy="96" r="60" fill="url(#glow)"/>

  <!-- Main Icon Group -->
  <g transform="translate(16, 16)" filter="url(#shadow)">
    <!-- Sleek Container Circle -->
    <circle cx="80" cy="80" r="48" fill="#1e293b" opacity="0.6" stroke="#334155" stroke-width="2"/>
    
    <!-- Dynamic Checkmark -->
    <path d="M 56 82 L 72 98 L 108 58" fill="none" stroke="url(#primary)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Small decorative accent -->
  <circle cx="150" cy="42" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="42" cy="150" r="3" fill="#0284c7" opacity="0.5"/>
</svg>
